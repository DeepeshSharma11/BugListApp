services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bugtracker_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/bugs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app_network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: bugtracker_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
